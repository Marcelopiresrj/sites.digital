<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sites Digital — Páginas publicadas</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#0A0A0C;color:#F5F5F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrap{max-width:640px;width:100%}
  h1{font-size:1.8rem;margin:0 0 8px}
  p{color:#9A9AA3;margin:0 0 32px}
  .card{display:flex;align-items:center;justify-content:space-between;background:#141417;border:1px solid #26262C;border-radius:14px;padding:20px 24px;margin-bottom:14px;text-decoration:none;color:#F5F5F2;transition:transform .2s, border-color .2s}
  .card:hover{transform:translateY(-2px);border-color:#3D5CFF}
  .card strong{font-size:1.05rem}
  .card span{display:block;font-size:.82rem;color:#9A9AA3;margin-top:2px}
  .arrow{font-size:1.3rem;color:#9A9AA3}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sites Digital</h1>
  <p>Páginas publicadas neste repositório</p>
</div>
</body>
</html>
